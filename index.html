<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>loot goblins v1.5.6</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <nav><button class="corea" onclick="toggleDiv('core')">CORE</button> | <button class="lorea" onclick="toggleDiv('lore')">LORE</button> | <button class="playa" onclick="toggleDiv('play')">PLAY EX</button></nav>

    <div id="core" class="core hidden">
        <zero-md src="core.md"></zero-md>
    </div>

   <div id="lore" class="lore hidden">
        <zero-md src="wip/lore.md"></zero-md>
    </div>

   <div id="play" class="play hidden">
        <zero-md src="wip/play-examples.md"></zero-md>
    </div>

    <script>
        $(document).ready(function () {
            $(".corea").click(function () {
                $(".core").toggle();
            });
        });

        $(document).ready(function () {
            $(".lorea").click(function () {
                $(".lore").toggle();
            });
        });

        $(document).ready(function () {
            $(".playa").click(function () {
                $(".play").toggle();
            });
        });
    </script>

</body>

</html>
